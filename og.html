<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    background: #faf6ef;
    -webkit-print-color-adjust: exact;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    position: relative;
    width: 1020px; height: 470px;
    background: #ffffff;
    border: 1px solid rgba(250, 80, 15, 0.16);
    border-radius: 28px;
    box-shadow: 0 30px 80px rgba(120, 50, 0, 0.16);
    padding: 64px 70px;
    display: flex; flex-direction: column; justify-content: center;
    overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 8px;
    background: linear-gradient(90deg, #ffd800 0%, #ff8205 45%, #e10500 100%);
  }
  .pill {
    align-self: flex-start;
    font-size: 19px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
    color: #fa500f; border: 1.5px solid rgba(250, 80, 15, 0.36);
    border-radius: 999px; padding: 9px 18px; margin-bottom: 30px;
  }
  .wordmark { font-size: 96px; font-weight: 800; letter-spacing: -0.03em; color: #1a1a1a; line-height: 1; }
  .wordmark .os { color: #fa500f; }
  .tagline { margin-top: 22px; font-size: 38px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.01em; }
  .foot { margin-top: 40px; display: flex; align-items: center; gap: 16px; font-size: 22px; color: #4a4540; }
  .foot .dot { width: 10px; height: 10px; border-radius: 50%; background: #fa500f; }
  .foot b { color: #1a1a1a; font-weight: 800; }
</style>
</head>
<body>
  <div class="card">
    <div class="pill">Propulsé par Mistral · Confidentiel</div>
    <div class="wordmark">Aura<span class="os">&nbsp;OS</span></div>
    <div class="tagline">Le système d'exploitation post-app.</div>
    <div class="foot"><span class="dot"></span><span><b>Fuse Link</b> &nbsp;·&nbsp; préparé par Özgür Celebi</span></div>
  </div>
</body>
</html>
